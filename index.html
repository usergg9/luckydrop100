<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuckyScratch</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">
  <button id="profileBtn" class="icon-btn">👤</button>
  <h1>🎁 LuckyScratch</h1>
</header>

<!-- MAIN -->
<main class="container">

  <!-- SCRATCH -->
  <section class="scratch-card">

    <div id="prizeReveal" class="prize-reveal">🎁 ???</div>

    <canvas id="scratchCanvas"></canvas>

  </section>

  <button id="claimBtn" class="claim-btn">CANJEAR PREMIO</button>

  <!-- RANKING -->
  <section class="ranking">
    <h2>🏆 Premios raros hoy</h2>
    <div id="rankingList">Cargando...</div>
  </section>

</main>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden"></div>

<!-- SIDE MENU -->
<aside id="sideMenu" class="side-menu hidden">

    <div id="avatar">👤</div>
    <div>
      <p id="username">Usuario</p>
      <p id="email">correo@ejemplo.com</p>
    </div>
  </div>

  <button id="openRewards">📦 Mis premios</button>
  <button id="openAvatar">🖼 Cambiar avatar</button>
  <button id="logoutBtn">🚪 Cerrar sesión</button>

</aside>

<!-- LOGIN MODAL -->
<div id="authModal" class="modal hidden">
  <div class="modal-box">

    <h2>Acceso</h2>

    <input id="emailInput" type="email" placeholder="Email"/>
    <input id="passInput" type="password" placeholder="Contraseña"/>
    <input id="userInput" type="text" placeholder="Nombre usuario"/>

    <button id="loginBtn">Iniciar sesión</button>
    <button id="registerBtn">Registrarse</button>

  </div>
</div>
