<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuckyScratch</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <button id="profileBtn">👤</button>
  <h1>LuckyScratch</h1>
</header>

<main class="container">

  <div class="scratch-card">
    <div id="prizeReveal">🎁 ???</div>
    <canvas id="scratchCanvas"></canvas>
  </div>

  <button id="claimBtn">CANJEAR PREMIO</button>

</main>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden"></div>

<!-- PROFILE -->
<div id="sideMenu" class="side-menu hidden">

  <div id="menuMain">

    <h3>Perfil</h3>

    <button onclick="openAvatars()">🖼 Avatares</button>
    <button onclick="openRewards()">📦 Mis premios</button>
    <button onclick="logout()">🚪 Cerrar sesión</button>

  </div>

  <div id="menuAvatars" class="hidden">
    <button onclick="backMenu()">← Volver</button>

    <div class="grid">
      <span onclick="setAvatar('👤')">👤</span>
      <span onclick="setAvatar('😎')">😎</span>
      <span onclick="setAvatar('🤖')">🤖</span>
      <span onclick="setAvatar('🦊')">🦊</span>
      <span onclick="setAvatar('🐼')">🐼</span>
      <span onclick="setAvatar('🐸')">🐸</span>
      <span onclick="setAvatar('🦁')">🦁</span>
      <span onclick="setAvatar('👻')">👻</span>
      <span onclick="setAvatar('🐧')">🐧</span>
      <span onclick="setAvatar('🐱')">🐱</span>
    </div>
  </div>

  <div id="menuRewards" class="hidden">
    <button onclick="backMenu()">← Volver</button>
    <div id="myRewards"></div>
  </div>

</div>

<!-- AUTH -->
<footer class="auth">

  <div>
    <button onclick="showLogin()">Login</button>
    <button onclick="showRegister()">Registro</button>
  </div>

  <div id="loginBox">
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
  </div>

  <div id="registerBox" class="hidden">
    <input id="regUser" placeholder="Usuario">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password">
    <button onclick="register()">Crear</button>
  </div>

</footer>

</body>
